<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Integrated Analysis Guide</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9ded7;
      --accent: #23645d;
      --accent-ink: #ffffff;
      --soft: #e9f2ef;
      --code: #111827;
      --code-bg: #f0f3f2;
      --shadow: 0 18px 60px rgba(22, 34, 42, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    a {
      color: var(--accent);
    }

    .shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: #eef1ed;
    }

    .sidebar h1 {
      margin: 0 0 14px;
      font-size: 19px;
      line-height: 1.25;
    }

    .sidebar .source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav a {
      display: block;
      padding: 7px 9px;
      border-radius: 6px;
      color: #344054;
      text-decoration: none;
      font-size: 14px;
    }

    .nav a:hover {
      background: #dde7e2;
      color: #143f3a;
    }

    main {
      max-width: 1040px;
      width: 100%;
      padding: 34px 42px 80px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 600;
      text-decoration: none;
    }

    .content {
      min-width: 0;
    }

    .content h1 {
      margin: 0 0 16px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .content h2 {
      margin: 34px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .content h3 {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .content h4 {
      margin: 18px 0 8px;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .content p,
    .content ul {
      margin: 0 0 13px;
    }

    .content li {
      margin: 4px 0;
    }

    .modal-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 44px;
      margin: 10px 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 650;
      text-align: left;
    }

    .modal-trigger:hover {
      border-color: #9ab8ae;
      background: var(--soft);
    }

    .modal-trigger span:last-child {
      color: var(--accent);
      font-size: 13px;
      white-space: nowrap;
    }

    table {
      width: 100%;
      margin: 14px 0 20px;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    th,
    td {
      padding: 9px 10px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef4f1;
      font-weight: 700;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--code-bg);
      color: var(--code);
      font-family: "Cascadia Mono", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    pre {
      overflow: auto;
      margin: 14px 0 18px;
      padding: 14px;
      border-radius: 7px;
      background: #111827;
      color: #f9fafb;
    }

    pre code {
      padding: 0;
      background: transparent;
      color: inherit;
      font-size: 13px;
      line-height: 1.55;
    }

    .mermaid-box {
      margin: 14px 0 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      overflow: auto;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.55);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(980px, 100%);
      max-height: min(86vh, 920px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #f5f7f5;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .modal-close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .modal-body {
      overflow: auto;
      padding: 20px 22px 26px;
    }

    .loading,
    .error {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
    }

    @media (max-width: 840px) {
      .shell {
        display: block;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 24px 18px 60px;
      }

      .content h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1>Integrated Analysis Guide</h1>
      <a class="source" href="dy-analysis-integrated-guide.md">Markdown source</a>
      <nav id="nav" class="nav" aria-label="Guide sections"></nav>
    </aside>

    <main>
      <div class="toolbar">
        <p>File notes and full commented code open in modal windows.</p>
        <a class="button-link" href="dy-analysis-integrated-guide.md">Open Markdown</a>
      </div>
      <article id="content" class="content">
        <div class="loading">Loading guide...</div>
      </article>
    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <section class="modal">
      <header class="modal-header">
        <h2 id="modalTitle"></h2>
        <button id="modalClose" class="modal-close" type="button" aria-label="Close modal">&times;</button>
      </header>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <script>
    const guidePath = "dy-analysis-integrated-guide.md";
    const modals = [];
    const contentEl = document.getElementById("content");
    const navEl = document.getElementById("nav");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");

    fetch(guidePath)
      .then((response) => {
        if (!response.ok) throw new Error("Could not load " + guidePath);
        return response.text();
      })
      .then((markdown) => {
        const prepared = extractDetails(markdown);
        contentEl.innerHTML = renderMarkdown(prepared);
        buildNav();
        renderMermaid();
      })
      .catch((error) => {
        contentEl.innerHTML = '<div class="error"><strong>Unable to load the guide.</strong><br>' +
          escapeHtml(error.message) + '<br><br>Open this page through GitHub Pages or another local web server so the browser can fetch the Markdown file.</div>';
      });

    function extractDetails(markdown) {
      return markdown.replace(/<details>\s*<summary>([\s\S]*?)<\/summary>\s*([\s\S]*?)<\/details>/g, (_, rawTitle, body) => {
        const title = stripTags(rawTitle).trim();
        const id = modals.push({ title, body: body.trim() }) - 1;
        return "\n\n[[MODAL:" + id + "]]\n\n";
      });
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/^\uFEFF/, "").split(/\r?\n/);
      const html = [];
      let paragraph = [];
      let list = [];
      let inCode = false;
      let codeLang = "";
      let codeLines = [];

      const flushParagraph = () => {
        if (paragraph.length) {
          html.push("<p>" + renderInline(paragraph.join(" ")) + "</p>");
          paragraph = [];
        }
      };

      const flushList = () => {
        if (list.length) {
          html.push("<ul>" + list.map((item) => "<li>" + renderInline(item) + "</li>").join("") + "</ul>");
          list = [];
        }
      };

      const flushCode = () => {
        const code = escapeHtml(codeLines.join("\n"));
        if (codeLang === "mermaid") {
          html.push('<div class="mermaid-box"><pre class="mermaid">' + code + "</pre></div>");
        } else {
          html.push("<pre><code>" + code + "</code></pre>");
        }
        inCode = false;
        codeLang = "";
        codeLines = [];
      };

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.startsWith("```")) {
          if (inCode) {
            flushCode();
          } else {
            flushParagraph();
            flushList();
            inCode = true;
            codeLang = line.slice(3).trim();
            codeLines = [];
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (/^\[\[MODAL:\d+\]\]$/.test(line.trim())) {
          flushParagraph();
          flushList();
          const id = Number(line.match(/\d+/)[0]);
          const title = escapeHtml(modals[id].title);
          html.push('<button class="modal-trigger" type="button" data-modal-id="' + id + '"><span>' + title + '</span><span>Open</span></button>');
          continue;
        }

        if (/^\s*$/.test(line)) {
          flushParagraph();
          flushList();
          continue;
        }

        if (isTableStart(lines, i)) {
          flushParagraph();
          flushList();
          const tableLines = [];
          while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
            tableLines.push(lines[i]);
            i++;
          }
          i--;
          html.push(renderTable(tableLines));
          continue;
        }

        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          flushList();
          const level = heading[1].length;
          const text = stripTags(heading[2].trim());
          const id = slugify(text);
          html.push("<h" + level + ' id="' + id + '">' + renderInline(text) + "</h" + level + ">");
          continue;
        }

        const listItem = line.match(/^\s*-\s+(.+)$/);
        if (listItem) {
          flushParagraph();
          list.push(listItem[1]);
          continue;
        }

        paragraph.push(line.trim());
      }

      if (inCode) flushCode();
      flushParagraph();
      flushList();

      return html.join("\n");
    }

    function isTableStart(lines, index) {
      return /^\s*\|.*\|\s*$/.test(lines[index] || "") &&
        /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1] || "");
    }

    function renderTable(lines) {
      const rows = lines.map((line) => line.trim().replace(/^\||\|$/g, "").split("|").map((cell) => cell.trim()));
      const headers = rows[0] || [];
      const bodyRows = rows.slice(2);
      const thead = "<thead><tr>" + headers.map((cell) => "<th>" + renderInline(cell) + "</th>").join("") + "</tr></thead>";
      const tbody = "<tbody>" + bodyRows.map((row) => "<tr>" + row.map((cell) => "<td>" + renderInline(cell) + "</td>").join("") + "</tr>").join("") + "</tbody>";
      return "<table>" + thead + tbody + "</table>";
    }

    function renderInline(text) {
      let output = escapeHtml(text);
      const code = [];
      output = output.replace(/`([^`]+)`/g, (_, value) => {
        const index = code.push("<code>" + value + "</code>") - 1;
        return "\u0000CODE" + index + "\u0000";
      });
      output = output.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      output = output.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      output = output.replace(/\u0000CODE(\d+)\u0000/g, (_, index) => code[Number(index)]);
      return output;
    }

    function buildNav() {
      const headings = [...contentEl.querySelectorAll("h2")];
      navEl.innerHTML = headings.map((heading) =>
        '<a href="#' + heading.id + '">' + heading.textContent + "</a>"
      ).join("");
    }

    function renderMermaid() {
      const mermaidBlocks = contentEl.querySelectorAll("pre.mermaid");
      if (!mermaidBlocks.length) return;
      const script = document.createElement("script");
      script.type = "module";
      script.textContent = 'import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs"; mermaid.initialize({ startOnLoad: true, theme: "neutral" });';
      document.body.appendChild(script);
    }

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-modal-id]");
      if (!trigger) return;
      const modal = modals[Number(trigger.dataset.modalId)];
      modalTitle.textContent = modal.title;
      modalBody.innerHTML = renderMarkdown(modal.body);
      modalBackdrop.classList.add("open");
      modalClose.focus();
    });

    modalClose.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    function closeModal() {
      modalBackdrop.classList.remove("open");
      modalBody.innerHTML = "";
    }

    function slugify(text) {
      return text.toLowerCase()
        .replace(/`/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function stripTags(text) {
      return text.replace(/<[^>]+>/g, "");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
